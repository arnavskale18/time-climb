<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost in Space | Time Climb</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .error-code {
            font-family: var(--font-serif);
            font-size: 15vw;
            line-height: 0.8;
            color: var(--color-gold);
            opacity: 0.2;
            position: absolute;
            z-index: -1;
        }

        .error-content h1 {
            font-size: 3rem;
            margin-bottom: var(--spacing-md);
        }

        .error-content p {
            opacity: 0.7;
            margin-bottom: var(--spacing-lg);
        }
    </style>
</head>
<body>
    <div class="error-code">404</div>
    <div class="error-content">
        <h1 class="font-serif">Orbit Lost.</h1>
        <p>The coordinates you entered do not exist in this sector.</p>
        <a href="index.html" class="btn-primary">RETURN TO BASE</a>
    </div>
</body>
</html>
